version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tamkin-postgres-local
    environment:
      POSTGRES_USER: tamkin
      POSTGRES_PASSWORD: tamkin_local_password
      POSTGRES_DB: tamkin_local
    ports:
      - "5434:5432"
    volumes:
      - postgres-data-local:/var/lib/postgresql/data
    networks:
      - tamkin-network-local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tamkin -d tamkin_local"]
      interval: 10s
      timeout: 5s
      retries: 5

  tamkin-backend:
    build:
      context: ./tamkin-backend
      dockerfile: Dockerfile
    container_name: tamkin-backend-local
    expose:
      - "3000"
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: tamkin
      DATABASE_PASSWORD: tamkin_local_password
      DATABASE_NAME: tamkin_local
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tamkin-network-local
    volumes:
      - ./tamkin-backend/src:/app/src
      - ./tamkin-backend/test:/app/test
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  tamkin-frontend:
    build:
      context: ./tamkin-frontend
      dockerfile: Dockerfile
    container_name: tamkin-frontend-local
    expose:
      - "3000"
    depends_on:
      tamkin-backend:
        condition: service_healthy
    environment:
      NODE_ENV: development
    networks:
      - tamkin-network-local
    volumes:
      - ./tamkin-frontend/app:/app/app
      - ./tamkin-frontend/public:/app/public
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx:alpine
    container_name: tamkin-nginx-local
    ports:
      - "3080:80"
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      tamkin-frontend:
        condition: service_healthy
      tamkin-backend:
        condition: service_healthy
    networks:
      - tamkin-network-local
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost/health",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  tamkin-network-local:
    driver: bridge

volumes:
  postgres-data-local:
