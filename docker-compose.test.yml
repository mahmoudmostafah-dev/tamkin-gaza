version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-test
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_EXTERNAL_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres-data-test:/var/lib/postgresql/data
    networks:
      - tamkin-network-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  tamkin-backend:
    build:
      context: ./tamkin-backend
      dockerfile: Dockerfile
    container_name: backend-test
    expose:
      - "${BACKEND_PORT}"
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${POSTGRES_PORT}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tamkin-network-test
    restart: on-failure

  tamkin-frontend:
    build:
      context: ./tamkin-frontend
      dockerfile: Dockerfile
    container_name: frontend-test
    expose:
      - "3200"
    depends_on:
      - tamkin-backend
    environment:
      NODE_ENV: ${FRONTEND_NODE_ENV}
      PORT: 3200
    networks:
      - tamkin-network-test
    restart: on-failure

  nginx:
    image: nginx:alpine
    container_name: nginx-test
    ports:
      - "${NGINX_EXTERNAL_PORT}:80"
    volumes:
      - ./nginx/nginx.test.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - tamkin-frontend
      - tamkin-backend
    networks:
      - tamkin-network-test
    restart: on-failure

networks:
  tamkin-network-test:
    driver: bridge

volumes:
  postgres-data-test:
