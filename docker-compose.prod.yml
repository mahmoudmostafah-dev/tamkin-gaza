version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tamkin-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_EXTERNAL_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres-data-prod:/var/lib/postgresql/data
    networks:
      - tamkin-network-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  tamkin-backend:
    build:
      context: ./tamkin-backend
      dockerfile: Dockerfile
    container_name: tamkin-backend-prod
    expose:
      - "${BACKEND_PORT}"
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${POSTGRES_PORT}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tamkin-network-prod
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:${BACKEND_PORT}', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  tamkin-frontend:
    build:
      context: ./tamkin-frontend
      dockerfile: Dockerfile
    container_name: tamkin-frontend-prod
    expose:
      - "${FRONTEND_PORT}"
    depends_on:
      tamkin-backend:
        condition: service_healthy
    environment:
      NODE_ENV: ${FRONTEND_NODE_ENV}
    networks:
      - tamkin-network-prod
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:${FRONTEND_PORT}', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx:alpine
    container_name: tamkin-nginx-prod
    ports:
      - "${NGINX_EXTERNAL_PORT}:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      tamkin-frontend:
        condition: service_healthy
      tamkin-backend:
        condition: service_healthy
    networks:
      - tamkin-network-prod
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost/health",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  tamkin-network-prod:
    driver: bridge

volumes:
  postgres-data-prod:
