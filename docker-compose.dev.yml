
services:
  postgres:
    image: postgres:16-alpine
    container_name: safqah-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: safqah
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - safqah

volumes:
  postgres_data:

networks:
  safqah:
    driver: bridge